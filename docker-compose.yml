name: avito

services:
  postgres:
    container_name: postgres_go
    image: postgres:16.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_pass
      POSTGRES_DB: booking
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data/postgres
      - ./postgres-seed:/postgres-seed
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  app:
    container_name: app_go
    build: .
    ports:
      - "8080:8080"
    environment:
      DSN: postgres://postgres:my_pass@postgres:5432/booking?sslmode=disable
      SECRET: secret
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
