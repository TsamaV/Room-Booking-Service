version: '3.8'

services:
  postgres:
    container_name: postgres_go
    image: postgres:16.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_pass
      POSTGRES_DB: booking
      PGDATA: /data/postgres
    volumes:
      - ./postgres-data:/data/postgres
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: app_go
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres